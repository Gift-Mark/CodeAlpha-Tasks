<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Queue</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    *{
      padding: 0;
      margin: 0;
      font-family:Arial, Helvetica, sans-serif ;
      box-sizing: border-box;
    }
    body{
      /* margin-bottom: 70px; */
      min-height: 100vh;
      background: #0b0614;
      color: #fff;
      counter-reset: #fff;
      padding-bottom:90px;
    }
    .topNav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px;
      font-size:20px;
      font-weight:bold;
    }
    .autoPlay{
      margin:15px;
      padding:20px;
      background:#2b0a4d;
      border-radius:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    /* TOGGLE */
    .toggle{
      width:50px;
      height:26px;
      background:#555;
      border-radius:20px;
      position:relative;
    }

    .toggle::before{
      content:"";
      position:absolute;
      width:22px;
      height:22px;
      background:#fff;
      border-radius:50%;
      top:2px;
      left:2px;
    }

    .now{
      font-size: 19px;
      font-weight: bold;
      /* padding: 8px; */
    }

    .playing{
      display:flex;
      align-items:center;
      gap:15px;
      margin:15px;
      padding:15px;
      background:#2b0a4d;
      border-radius:16px;
    }

    .playing img{
      width:60px;
      height:60px;
      border-radius:10px;
    }

    .song-info{
      flex:1;
    }

    .song-title{
      font-weight:bold;
      color:#a855f7;
    }

    .next{
      display: flex;
      justify-content:space-between;
      margin:15px;
      font-weight:bold;
    }

    .next button{
      font-size: 16px;
      background:none;
      color:#a855f7;
      border:none;
    }

    .open-player-row {
      margin: 0 15px 18px;
      text-align: right;
    }

    .nav-link {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(142,59,255,0.16);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .nav-link:hover {
      background: rgba(142,59,255,0.25);
      transform: translateY(-1px);
    }

    .queue-list {
      display: grid;
      gap: 12px;
      margin: 0 15px;
    }

    .queue-song {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1d0f3a;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: grab;
      transition: background 0.2s ease, transform 0.2s ease;
      user-select: none;
    }

    .queue-song:hover {
      background: #2e185f;
      transform: translateY(-1px);
    }

    .queue-song.dragging {
      opacity: 0.5;
      background: #3a2a5f;
    }

    .queue-song.drag-over {
      background: #4a3a7f;
      border: 2px solid #a855f7;
    }

    .queue-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: left;
    }

    .queue-info p:first-child {
      font-weight: bold;
      color: #f8f7ff;
    }

    .queue-info p:last-child {
      color: #b9a8ff;
      font-size: 0.95rem;
    }

    .queue-action {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #a855f7;
      font-size: 0.96rem;
      font-weight: 700;
    }

    .queue-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .queue-btn {
      background: none;
      border: none;
      color: #a855f7;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      transition: transform 0.2s, color 0.2s;
    }

    .queue-btn:hover {
      color: #d84bff;
      transform: scale(1.1);
    }

    .drag-handle {
      color: #888;
      cursor: grab;
      margin-right: 8px;
      font-size: 14px;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .song{
      display: flex;
      align-items: center;
      gap: 15px;
      padding:12px 15px;
    }

    .song img{
      width: 55px;
      height: 55px;
      border-radius: 10px;
    }

    .song-details{
      flex: 1;
    }

    .song-details p:first-child{
      font-weight: bold;
    }

    .song i{
      color: #aaa;
    }

    /* BOTTOM PLAYER */
    .player{
      position:fixed;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      width:90%;
      background:#2b0a4d;
      border-radius:20px;
      padding:15px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:20px;
    }

    .play-btn{
      background:#9333ea;
      padding:12px;
      border-radius:50%;
    }

    .progress-container{
      width: 100%;
      height: 5px;
      background: #555;
      border-radius: 5px;
      margin-top: 5px;
      cursor: pointer;
    }

    .progress{
      height: 100%;
      width: 0%;
      background: #a855f7;
      border-radius: 5px;
    }

    .toggle.active{
  background:#9333ea;
}

.toggle.active::before{
  transform:translateX(24px);
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:5px;
  color:#bbb;
}

.song{
  transition:0.3s;
}

.song:hover{
  background:#1f1035;
  cursor:pointer;
  border-radius:12px;
}

.play-btn{
  transition:0.3s;
}

.play-btn:hover{
  transform:scale(1.1);
}

@media(max-width:600px){

  .player{
    width:95%;
    padding:12px;
  }

  .controls{
    gap:15px;
  }

  .song img{
    width:50px;
    height:50px;
  }

  .playing img{
    width:55px;
    height:55px;
  }
}
  </style>
</head>
<body>
  <div class="topNav">
    <i class="fa fa-angle-down"></i>
    <p>Queue</p>
    <i class="fa fa-ellipsis"></i>
  </div>

  <!-- AUTOPLAY -->
  <div class="autoPlay">
    <div>
      <p><b>Autoplay</b></p>
      <p>Similar tracks will play next</p>
    </div>
    <div class="toggle"></div>
  </div>

  <p class="now">Now Playing</p>

  <div class="playing">
    <img src="images/girl-1990347_640.jpg" alt="Girl with Headphones">
    <div class="song-info">
    <p class="song-title" id="topTitle">Starlight Shadows</p>
    <p id="currentArtist">The Midnight Echoes</p>
    </div>
    <i class="fa fa-bars"></i>
  </div>

  <!-- QUEUE -->
  <div class="next">
    <p>Up Next</p>
    <button id="clearQueue">Clear All</button>
  </div>

  <div class="queue-list" id="queueList"></div>

  <div class="open-player-row">
    <a class="nav-link open-player" href="musicplayer.html">Open Player</a>
  </div>

  <!-- PLAYER -->
<div class="player">
  <div>
    <p id="currentTitle">Starlight Shadows</p>

    <div class="progress-container" id="progressContainer">
      <div class="progress" id="progress"></div>
    </div>
    <div class="time">
  <span id="currentTime">0:00</span>
  <span id="duration">0:00</span>
</div>
  </div>

  <div class="controls">
    <i class="fa fa-backward"></i>

    <div class="play-btn" id="playBtn">
      <i class="fa fa-play" id="playIcon"></i>
    </div>

    <i class="fa fa-forward"></i>
  </div>
</div>

  <audio id="audio"></audio>

  <script src="songs.js"></script>
  <script>
// ===== QUEUE FUNCTIONS =====
function saveQueue() {
  const queueSongs = queueIndexes.map(index => songs[index]);
  localStorage.setItem("queueSongs", JSON.stringify(queueSongs));
}

let draggedElement = null;

function handleDragStart(e) {
  draggedElement = this;
  this.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}

function handleDragEnd(e) {
  this.classList.remove("dragging");
  document.querySelectorAll(".queue-song").forEach(el => {
    el.classList.remove("drag-over");
  });
  draggedElement = null;
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  if (e.target.closest(".queue-song") && e.target.closest(".queue-song") !== draggedElement) {
    e.target.closest(".queue-song").classList.add("drag-over");
  }
}

function handleDragLeave(e) {
  if (e.target.closest(".queue-song")) {
    e.target.closest(".queue-song").classList.remove("drag-over");
  }
}

function handleDrop(e) {
  e.preventDefault();
  e.stopPropagation();

  const dropTarget = e.target.closest(".queue-song");
  if (!dropTarget || dropTarget === draggedElement) return;

  const draggedIndex = Number(draggedElement.dataset.queuePosition);
  const dropIndex = Number(dropTarget.dataset.queuePosition);

  if (draggedIndex !== dropIndex) {
    const [movedSong] = queueIndexes.splice(draggedIndex, 1);
    queueIndexes.splice(dropIndex, 0, movedSong);
    saveQueue();
    renderQueue();
  }
}

// ===== ELEMENTS =====
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const playIcon = document.getElementById("playIcon");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const currentTitleEl = document.getElementById("currentTitle");
const topTitleEl = document.getElementById("topTitle");
const currentArtistEl = document.getElementById("currentArtist");
const queueList = document.getElementById("queueList");

// ===== STATE =====
let currentSong = 0;
let isPlaying = false;
let autoplay = true;

const savedSong = Number(localStorage.getItem("currentSong"));
if (!Number.isNaN(savedSong) && savedSong >= 0 && savedSong < songs.length) {
  currentSong = savedSong;
}

const savedAutoplay = localStorage.getItem("queueAutoplay");
if (savedAutoplay !== null) {
  autoplay = savedAutoplay === "true";
}

const rawQueue = JSON.parse(localStorage.getItem("queueSongs")) || songs;
const queueIndexes = rawQueue
  .map((item) => {
    if (typeof item === "number") {
      return item;
    }
    return songs.findIndex(
      (song) => song.title === item.title && song.artist === item.artist
    );
  })
  .filter((index) => index >= 0);

function renderQueue() {
  queueList.innerHTML = "";
  queueIndexes.forEach((songIndex, queuePosition) => {
    const song = songs[songIndex];
    queueList.innerHTML += `
      <div class="queue-song" draggable="true" data-index="${songIndex}" data-queue-position="${queuePosition}">
        <div style="display: flex; align-items: center; flex: 1;">
          <span class="drag-handle">☰</span>
          <div class="queue-info">
            <p>${song.title}</p>
            <p>${song.artist}</p>
          </div>
        </div>
        <div class="queue-actions">
          <button class="queue-btn play-next-btn" title="Play Next">⏭</button>
          <button class="queue-btn remove-btn" title="Remove">✕</button>
        </div>
      </div>
    `;
  });

  // Add event listeners to all queue items
  document.querySelectorAll(".queue-song").forEach((songEl) => {
    // Play song on click (excluding buttons)
    songEl.addEventListener("click", (e) => {
      if (e.target.closest('.queue-btn')) return;
      const index = Number(songEl.dataset.index);
      loadSong(index);
      audio.play();
      playIcon.classList.replace("fa-play", "fa-pause");
      isPlaying = true;
    });

    // Drag handlers
    songEl.addEventListener("dragstart", handleDragStart);
    songEl.addEventListener("dragend", handleDragEnd);
    songEl.addEventListener("dragover", handleDragOver);
    songEl.addEventListener("drop", handleDrop);
    songEl.addEventListener("dragleave", handleDragLeave);

    // Remove button
    songEl.querySelector(".remove-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      const index = Number(songEl.dataset.index);
      const queuePosition = queueIndexes.indexOf(index);
      if (queuePosition !== -1) {
        queueIndexes.splice(queuePosition, 1);
        saveQueue();
        renderQueue();
      }
    });

    // Play next button
    songEl.querySelector(".play-next-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      const index = Number(songEl.dataset.index);
      const queuePosition = queueIndexes.indexOf(index);
      if (queuePosition !== -1 && queuePosition > 0) {
        queueIndexes.splice(queuePosition, 1);
        queueIndexes.splice(0, 0, index);
        saveQueue();
        renderQueue();
      }
    });
  });
}

// ===== LOAD SONG =====
function loadSong(index) {
  currentSong = index;
  const song = songs[index];

  audio.src = song.src;
  currentTitleEl.textContent = song.title;
  topTitleEl.textContent = song.title;
  currentArtistEl.textContent = song.artist;
  localStorage.setItem("currentSong", index);
}

renderQueue();
loadSong(currentSong);

// ===== PLAY / PAUSE =====
function togglePlay() {
  if (isPlaying) {
    audio.pause();
    playIcon.classList.replace("fa-pause", "fa-play");
  } else {
    audio.play();
    playIcon.classList.replace("fa-play", "fa-pause");
  }
  isPlaying = !isPlaying;
}

// ===== NEXT =====
function nextSong() {
  const currentQueuePosition = queueIndexes.indexOf(currentSong);
  if (currentQueuePosition !== -1 && currentQueuePosition < queueIndexes.length - 1) {
    currentSong = queueIndexes[currentQueuePosition + 1];
  } else if (queueIndexes.length > 0) {
    currentSong = queueIndexes[0];
  } else {
    currentSong = (currentSong + 1) % songs.length;
  }
  loadSong(currentSong);
  audio.play();
  playIcon.classList.replace("fa-play", "fa-pause");
  isPlaying = true;
}

// ===== PREVIOUS =====
function prevSong() {
  const currentQueuePosition = queueIndexes.indexOf(currentSong);
  if (currentQueuePosition > 0) {
    currentSong = queueIndexes[currentQueuePosition - 1];
  } else if (queueIndexes.length > 0) {
    currentSong = queueIndexes[queueIndexes.length - 1];
  } else {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
  }
  loadSong(currentSong);
  audio.play();
  playIcon.classList.replace("fa-play", "fa-pause");
  isPlaying = true;
}

// ===== SEEK =====
progressContainer.addEventListener("click", (e) => {
  const width = progressContainer.clientWidth;
  const clickX = e.offsetX;
  const duration = audio.duration;

  audio.currentTime = (clickX / width) * duration;
});

// ===== AUTO NEXT =====
audio.addEventListener("ended", () => {
  if (autoplay) {
    nextSong();
  } else {
    playIcon.classList.replace("fa-pause", "fa-play");
    isPlaying = false;
  }
});

// ===== CLEAR QUEUE =====
document.getElementById("clearQueue").addEventListener("click", () => {
  queueIndexes.length = 0;
  saveQueue();
  renderQueue();
});

document.addEventListener("dragover", (e) => {
  e.preventDefault();
});

// ===== EVENTS =====
playBtn.addEventListener("click", togglePlay);

// Attach to icons manually
document.querySelector(".fa-forward").addEventListener("click", nextSong);
document.querySelector(".fa-backward").addEventListener("click", prevSong);

// ===== AUTO PLAY =====
const toggle = document.querySelector(".toggle");
if (autoplay) {
  toggle.classList.add("active");
}

toggle.addEventListener("click", () => {
  autoplay = !autoplay;
  localStorage.setItem("queueAutoplay", autoplay.toString());
  toggle.classList.toggle("active", autoplay);
});

audio.addEventListener("timeupdate", () => {
  if(audio.duration){

    //progress bar
    const percent =
      (audio.currentTime / audio.duration) * 100;

    progress.style.width = percent + "%";

    // CURRENT TIME
    let currentMinutes =
      Math.floor(audio.currentTime / 60);

    let currentSeconds =
      Math.floor(audio.currentTime % 60);

    if(currentSeconds < 10){
      currentSeconds = "0" + currentSeconds;
    }

    // DURATION
    let durationMinutes =
      Math.floor(audio.duration / 60);

    let durationSeconds =
      Math.floor(audio.duration % 60);

    if(durationSeconds < 10){
      durationSeconds = "0" + durationSeconds;
    }

    document.getElementById("currentTime").textContent =
      `${currentMinutes}:${currentSeconds}`;

    document.getElementById("duration").textContent =
      `${durationMinutes}:${durationSeconds}`;
  }
});



function playSong(index){

  localStorage.setItem(
    "currentSong",
    index
  );

  window.location.href = "musicplayer.html";
}
</script>
  
</body>
</html>
