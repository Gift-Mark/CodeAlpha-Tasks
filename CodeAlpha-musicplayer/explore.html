<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #2b0a4d, #0b0614);
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px;
    }

    .explore-page {
      width: min(100%, 860px);
      background: rgba(18, 11, 36, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
    }

    .explore-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .explore-header h1 {
      font-size: 2.1rem;
      color: #fff;
    }

    .explore-header p {
      color: #c7c2e5;
      font-size: 0.96rem;
      max-width: 520px;
      line-height: 1.6;
    }

    .search-section {
      width: 100%;
      margin-bottom: 24px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box input {
      width: 100%;
      padding: 14px 16px 14px 42px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(142, 59, 255, 0.3);
      border-radius: 12px;
      color: #fff;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .search-box input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(142, 59, 255, 0.6);
      box-shadow: 0 0 12px rgba(142, 59, 255, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      color: rgba(142, 59, 255, 0.6);
      font-size: 1.1rem;
      pointer-events: none;
    }

    .clear-search {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s;
      display: none;
    }

    .clear-search:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .search-box input:not(:placeholder-shown) ~ .clear-search {
      display: block;
    }

    .search-results {
      color: #c7c2e5;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: #c7c2e5;
    }

    .no-results-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .song-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .song {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .song:hover {
      transform: translateY(-2px);
      background: rgba(142, 59, 255, 0.16);
      border-color: rgba(142, 59, 255, 0.45);
    }

    .song p {
      margin-bottom: 8px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .song p:first-child {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .song p:last-child {
      font-size: 0.92rem;
      color: #c3b9ff;
    }

    .nav-link {
      padding: 10px 18px;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(142, 59, 255, 0.12);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav-link:hover {
      transform: translateY(-1px);
      background: rgba(142, 59, 255, 0.22);
    }

    @media (max-width: 560px) {
      .explore-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="explore-page">
    <div class="explore-header">
      <div>
        <h1>Explore Music</h1>
        <p>Select a song to play in the music player. Each card opens the player with that track saved to your current session.</p>
      </div>
      <a class="nav-link" href="musicplayer.html">Open Player</a>
    </div>

    <div class="search-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search by song title or artist..."
          autocomplete="off"
        >
        <button class="clear-search" id="clearBtn" title="Clear search">✕</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <section id="exploreContainer" class="song-list"></section>
  </main>

  <script src="songs.js"></script>
  <script>
    const exploreContainer = document.getElementById("exploreContainer");
    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const searchResults = document.getElementById("searchResults");

    let filteredSongs = [...songs];

    function renderSongs(songsToRender) {
      exploreContainer.innerHTML = "";
      
      if (songsToRender.length === 0) {
        exploreContainer.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">🎵</div>
            <p>No songs found matching your search</p>
          </div>
        `;
        return;
      }

      songsToRender.forEach((song, index) => {
        const originalIndex = songs.findIndex(s => s.title === song.title && s.artist === song.artist);
        exploreContainer.innerHTML += `
          <div class="song" onclick="playSong(${originalIndex})">
            <p>${song.title}</p>
            <p>${song.artist}</p>
          </div>
        `;
      });
    }

    function updateSearchResults(query) {
      if (!query.trim()) {
        searchResults.textContent = "";
        filteredSongs = [...songs];
        renderSongs(filteredSongs);
        return;
      }

      const lowerQuery = query.toLowerCase().trim();
      filteredSongs = songs.filter(song => 
        song.title.toLowerCase().includes(lowerQuery) ||
        song.artist.toLowerCase().includes(lowerQuery)
      );

      renderSongs(filteredSongs);

      if (filteredSongs.length === 0) {
        searchResults.textContent = `No results for "${query}"`;
      } else {
        searchResults.textContent = `Found ${filteredSongs.length} song${filteredSongs.length !== 1 ? 's' : ''}`;
      }
    }

    searchInput.addEventListener("input", (e) => {
      updateSearchResults(e.target.value);
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      searchResults.textContent = "";
      filteredSongs = [...songs];
      renderSongs(filteredSongs);
      searchInput.focus();
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        searchInput.value = "";
        updateSearchResults("");
      }
    });

    renderSongs(songs);

    function playSong(index) {
      localStorage.setItem("currentSong", index);
      window.location.href = "musicplayer.html";
    }
  </script>
</body>
</html>
