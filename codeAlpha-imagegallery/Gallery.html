<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <style>
    *{
      box-sizing: border-box;
      font-family:Arial, Helvetica, sans-serif ;
    }

    body{
      margin: 0;
      padding: 20px;
      background: aliceblue;
    }

    .title{
      text-align: center;
      margin: 20px;
    }

   .gallery{
    display: grid;
    grid-template-columns: repeat(auto-fit, minimax(220px, 1fr));
   }

   .gallery img{
    width: 100%;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.5s;
    margin-bottom:15px;
   }

   .gallery img:hover{
    transform: scale(1.05);
   }

   /*Lightbox*/
   #lightbox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
   }

   #lightbox img{
    max-width: 85%;
    max-height: 85%;
    border-radius: 8px;
   }

   .nav{
    position: absolute;
    background: none;
    border: none;
    font-size: 40px;
    cursor: pointer;
    padding: 10px;
   }

   .prev{
    left: 20px;
   }

   .next{
    right: 20px;
   }

   .close{
    position: absolute;
    top: 15px;
    right:25px;
    font-size: 40px;
    color: white;
    cursor: pointer;
   }
  </style>
</head>
<body>
  <h1 class="title">Image Gallery</h1>

  <div class="gallery">
    <div>
    <img src="me.jpg" alt="Birthday girl" height="500" width="500" onclick="openLightBox(0)">
    <img src="Sui.jpg" alt="Workshop" height="500" width="500" onclick="openLightBox(1)">
    <img src="franca.jpg" alt="My friend" height="500" width="500" onclick="openLightBox(2)">
    </div>
    <div>
    <img src="Devs.jpg" alt="Devs at work" height="500" width="500" onclick="openLightBox(3)">
    <img src="unknown.jpg" alt="Team unknown" height="500" width="500" onclick="openLightBox(4)">
    <img src="Tims.jpg" alt="Lead dev" height="500" width="500" onclick="openLightBox(5)">
    </div>
  </div>

  <div id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <button class="nav prev" onclick="changeImage(-1)">Prev</button>
    <img id="lightbox-box">
    <button class="nav next" onclick="changeImage(1)">Next</button>
  </div>
  
  <script>
    const images = document.querySelectorAll(".gallery img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    let currentIndex = 0;

    function openLightBox(index) {
      currentIndex = index;
      lightboxImg.src = images[index].src;
      lightbox.style.display = "flex";
    }

    function closeLightbox() {
      lightbox.style.display = "none";
    }

    function changeImage(direction) {
      currentIndex += direction;

      if (currentIndex < 0) {
        currentIndex = images.length - 1;
      }else if (currentIndex >= images.length) {
        currentIndex = 0;
      }

      lightboxImg.src = images[currentIndex].src;
    }

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox){
        closeLightbox();
      }
    });

    document.addEventListener("keydown",(e) =>{
      if (lightbox.style.display === 'flex') {
        if (e.key === "ArrowRught")
        changeImage(1);
      if(e.key === "ArrowLeft")changeImage(-1);
      if(e.key === "Escape") closeLightbox();
      }
    });
  </script>
</body>
</html>
